name: Lint

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main
      - "feature/*"
      - "fix/*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: denoland/setup-deno@v1
        with:
          deno-version: v2.8.x
      - run: deno fmt --check
      - run: deno lint
      - run: deno check
      - run: deno test
      - name: Start server
        run: deno task user-api &
      - name: Wait for server
        run: |
          for i in $(seq 1 15); do
            curl -sf http://127.0.0.1:3100/healthcheck > /dev/null 2>&1 && exit 0
            sleep 1
          done
          echo "Server did not start in time" && exit 1
      - name: Integration tests
        run: deno task test:api
